<svg id="ID_svg_output"
      width="850" height="800"
      version="1.1" xmlns="http://www.w3.org/2000/svg">

   <defs>
      <filter id="ID_BackgroundShadow">
         <feDropShadow dx="2" dy="2" stdDeviation="0.2" />
      </filter>
<filter id="dropshadow" height="130%">
  <feGaussianBlur in="SourceAlpha" stdDeviation="3"/> <!-- stdDeviation is how much to blur -->
  <feOffset dx="0" dy="0" result="offsetblur"/> <!-- how much to offset -->
  <feComponentTransfer>
    <feFuncA type="linear" slope="0.95"/> <!-- slope is the opacity of the shadow -->
  </feComponentTransfer>
  <feMerge> 
    <feMergeNode/> <!-- this contains the offset blurred image -->
    <feMergeNode in="SourceGraphic"/> <!-- this contains the element that the filter is applied to -->
  </feMerge>
</filter>
      <style><![CDATA[

.cssWhy
{
   font-size : 75%;
   text-align : center;
   background : #FFFFFFA0;
}

.cssSeriesTitle
{
   text-align : center;
   filter: drop-shadow(0px 0px 3px #FFFFFF);
}

.cssBackground
{
   fill: #CCCCCC;
   paint-order: stroke;
}

rect.cssSeries
{
   stroke: #000000;
   stroke-width: 3px;
   fill: #FFFFFF;
   paint-order: stroke;
}

text.cssSeries, text.cssSeriesShadow
, tspan.cssSeries, tspan.cssSeriesShadow
{
   fill: #000000;
   text-anchor: middle;
   dominant-baseline: middle;
   alignment-baseline: middle;
   font-size: 15px;
}

text.cssSeriesShadow
, tspan.cssSeriesShadow
{
   fill: #FFFFFF;
   /*filter: blur(0.2em);*/
   filter: url(#dropshadow)
}





g.cssCareerItem > rect
{
   stroke: #000000;
   stroke-width: 3px;
   fill: #FFFFFF;
   paint-order: stroke;
   filter: drop-shadow( 10px 10px 10px rgba(50, 0, 0, .5));
}

g.cssCareerItem > text
, g.cssCareerItem tspan
{
   fill: #000000;
   text-anchor: middle;
   dominant-baseline: middle;
   alignment-baseline: middle;
   font-size: 15px;
   filter: drop-shadow( 1px 1px 10px rgba(0, 0, 0, 1));
}

g.cssCareerTitle > rect
{
   stroke-width: 10px;
}

g.cssCareerRoot > rect
{
   stroke-width: 6px;
}

g.cssCareerFeat > rect
{
}

g.cssCareerTitle > text
, g.cssCareerTitle tspan

{
   font-size: 25px;
}

g.cssCareerRoot > text
, g.cssCareerRoot tspan

{
}

g.cssCareerFeat > text
, g.cssCareerFeat tspan
{
}

.cssArrow
{
   stroke: #000000;
   stroke-width: 3px;
   stroke-linecap: round;
   stroke-linejoin: round;
}


      ]]></style>
   </defs>

   <rect x="0" y="0" width="850" height="800" class="cssBackground" />

<script>

function test_print_organized_novels_list_in_svg()
{
   let starting_position = {};
   starting_position.x = 400;
   starting_position.y = 75;

   const organized_series_svg = draw_organized_series_in_svg(starting_position);

   let svg_output = id("ID_svg_output");
   svg_output.innerHTML += organized_series_svg;
}

window.addEventListener("load", (event) => {
   test_print_organized_novels_list_in_svg();
});

</script>

<script>



function test_print_novels_list_in_svg()
{
   let a = [];

   let context = {};
   context.position = {};
   context.position.x = 400;
   context.position.y = 200;

   g_novels_list.forEach(
         (item) =>
         {
            let text = draw_one_series_in_svg(item, context.position);
            a.push(text);
            context.position.y += 150;
         }
      );

   let svg_output = id("ID_svg_output");
   svg_output.innerHTML += a.join("");
}

/*
window.addEventListener("load", (event) => {
   test_print_novels_list_in_svg();
});
*/
</script>

<script>

function test_print_novels_list()
{
   let a = [];

   a.push(`<ul>`);
   g_novels_list.forEach(
         (item) =>
         {
            a.push("<li>");
            a.push("<div>", item["name"], "</div>");
            a.push("<ol>")
            let books_list = item["books"];
            books_list.forEach(
                  (item) =>
                  {
                     a.push("<li>", item["name"], "</li>");
                  }
               );
            a.push("</ol>")
            a.push("</li>");
         }
      );
   a.push("</ul>");

   let output = id("ID_output");
   output.innerHTML = a.join("");
}

/*
window.addEventListener("load", (event) => {
   test_print_novels_list();
});
*/
</script>
